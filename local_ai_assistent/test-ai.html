<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Local AI Test — Diagnostics</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-white min-h-screen flex items-center justify-center p-6">

  <div class="w-full max-w-lg space-y-4">
    <h1 class="text-2xl font-bold text-center text-white">Local AI Diagnostics</h1>
    <p class="text-gray-400 text-center text-sm">
      Checks <code class="bg-gray-800 px-1 rounded">window.LanguageModel</code> (Chrome/Phi Mini)
      and <code class="bg-gray-800 px-1 rounded">window.ai.languageModel</code> (legacy/Gemini Nano).
    </p>

    <!-- Status card -->
    <div id="status-card" class="rounded-xl border border-gray-700 bg-gray-900 p-5 space-y-3">
      <div class="flex items-center gap-3">
        <div id="status-icon" class="text-2xl">⏳</div>
        <div>
          <p id="status-title" class="font-semibold text-gray-200">Checking...</p>
          <p id="status-desc" class="text-sm text-gray-400"></p>
        </div>
      </div>
    </div>

    <!-- Instructions card (hidden by default) -->
    <div id="instructions-card" class="rounded-xl border border-yellow-700 bg-yellow-950/30 p-5 hidden">
      <p class="font-semibold text-yellow-300 mb-2">How to enable</p>
      <ol id="instructions-list" class="text-sm text-yellow-200 space-y-1 list-decimal list-inside"></ol>
    </div>

    <!-- Model info (hidden by default) -->
    <div id="model-info" class="rounded-xl border border-gray-700 bg-gray-900 p-5 hidden">
      <p class="font-semibold text-gray-300 mb-3">Model Information</p>
      <div id="model-details" class="space-y-1 text-sm text-gray-400 font-mono"></div>
    </div>

    <!-- Test prompt section (hidden by default) -->
    <div id="test-section" class="rounded-xl border border-blue-700 bg-blue-950/20 p-5 hidden">
      <p class="font-semibold text-blue-300 mb-3">Response Test</p>
      <p class="text-sm text-gray-400 mb-3">
        Prompt: <em class="text-gray-300">"Answer in one sentence: what is the capital of Brazil?"</em>
      </p>
      <button
        id="btn-test"
        class="bg-blue-600 hover:bg-blue-500 text-white text-sm font-medium px-4 py-2 rounded-lg transition-colors disabled:opacity-50"
      >
        Run Test
      </button>
      <div id="test-result" class="mt-3 hidden">
        <p class="text-xs text-gray-500 mb-1">AI Response:</p>
        <p id="test-answer" class="text-gray-200 bg-gray-800 rounded-lg p-3 text-sm leading-relaxed"></p>
        <p id="test-timing" class="text-xs text-gray-500 mt-1"></p>
      </div>
    </div>

    <!-- Final verdict -->
    <div id="verdict" class="rounded-xl p-5 hidden text-center">
      <p id="verdict-text" class="text-lg font-bold"></p>
      <p id="verdict-sub" class="text-sm text-gray-400 mt-1"></p>
    </div>
  </div>

  <script>
    const $ = id => document.getElementById(id)

    function setStatus(icon, title, desc, borderColor = 'border-gray-700') {
      $('status-icon').textContent = icon
      $('status-title').textContent = title
      $('status-desc').textContent = desc
      $('status-card').className = `rounded-xl border ${borderColor} bg-gray-900 p-5 space-y-3`
    }

    function showInstructions(items) {
      const list = $('instructions-list')
      list.innerHTML = items.map(i => `<li>${i}</li>`).join('')
      $('instructions-card').classList.remove('hidden')
    }

    function showModelInfo(info) {
      const details = $('model-details')
      details.innerHTML = Object.entries(info)
        .map(([k, v]) => `<div><span class="text-gray-500">${k}:</span> <span class="text-gray-200">${v}</span></div>`)
        .join('')
      $('model-info').classList.remove('hidden')
    }

    function showVerdict(ok, text, sub) {
      const el = $('verdict')
      el.classList.remove('hidden')
      el.className = `rounded-xl p-5 text-center ${ok ? 'bg-green-950/40 border border-green-700' : 'bg-red-950/40 border border-red-700'}`
      $('verdict-text').textContent = text
      $('verdict-text').className = `text-lg font-bold ${ok ? 'text-green-400' : 'text-red-400'}`
      $('verdict-sub').textContent = sub
    }

    function startPolling(api, apiName) {
      let attempts = 0
      const interval = setInterval(async () => {
        attempts++
        try {
          const status = await api.availability()
          $('status-desc').textContent = `Checking… (attempt ${attempts}) · last status: ${status}`
          if (status === 'readily') {
            clearInterval(interval)
            location.reload()
          }
        } catch { /* ignore transient errors during polling */ }
      }, 15000)
    }

    async function runDiagnosis() {
      // 1 — Resolve API: new spec (window.LanguageModel) or legacy (window.ai.languageModel)
      const api = window.LanguageModel ?? window.ai?.languageModel ?? null
      const apiName = window.LanguageModel
        ? 'window.LanguageModel (Phi Mini / new)'
        : window.ai?.languageModel
          ? 'window.ai.languageModel (Gemini Nano / legacy)'
          : null

      if (!api) {
        setStatus('❌', 'API not found', 'No local AI API detected in this browser.', 'border-red-700')
        showInstructions([
          '<strong>Chrome (Phi Mini)</strong>: go to <code class="bg-gray-800 px-1 rounded">chrome://flags/#prompt-api-for-gemini-nano</code>',
          '<strong>Edge (Phi Silica)</strong>: go to <code class="bg-gray-800 px-1 rounded">edge://flags/#prompt-api-for-gemini-nano</code>',
          'Set the option to <strong>Enabled</strong> and click <strong>Restart</strong>',
          'Reopen this file after restarting',
          'If it still does not appear: check <code class="bg-gray-800 px-1 rounded">chrome://components</code> and download the model',
        ])
        showVerdict(false, '❌ AI unavailable', 'Follow the instructions above to enable the API.')
        return
      }

      setStatus('🔍', `API found: ${apiName}`, 'Checking model availability...', 'border-yellow-700')

      // 2 — Check availability
      let avail
      try {
        avail = await api.availability()
      } catch (e) {
        setStatus('⚠️', 'Error checking availability', e.message, 'border-orange-700')
        showVerdict(false, '⚠️ API error', 'Try updating Edge or checking the flags.')
        return
      }

      if (avail === 'no') {
        setStatus('🚫', 'Model not supported on this device', 'The hardware or configuration does not allow local AI.', 'border-red-700')
        showInstructions([
          '<strong>Chrome (Phi Mini)</strong>: requires a WebGPU-compatible GPU. Check <code class="bg-gray-800 px-1 rounded">chrome://gpu</code>.',
          '<strong>Edge (Phi Silica)</strong>: requires a Copilot+ PC with NPU (Snapdragon X, Intel Core Ultra, AMD Ryzen AI).',
          'Try updating Chrome/Edge to the latest version.',
          'Alternatively, test with Chrome Canary which supports more configurations.',
        ])
        showVerdict(false, '🚫 Model not supported', 'See the instructions above.')
        return
      }

      // 'downloading'  — new API (window.LanguageModel): actively downloading right now
      // 'downloadable' — new API: can be downloaded, hasn't started yet
      // 'after-download' — old API (window.ai.languageModel): same meaning as downloadable
      if (avail === 'downloading') {
        setStatus('⬇️', 'Model downloading now…', 'The download is in progress. This may take several minutes.', 'border-blue-700')
        showInstructions([
          '1. Open <code class="bg-gray-800 px-1 rounded">chrome://on-device-model-internals</code> to see download progress',
          '2. Or go to <code class="bg-gray-800 px-1 rounded">chrome://components</code> → find <strong>"Optimization Guide On Device Model"</strong>',
          '3. The download may take 5–30 minutes depending on your connection (~1–3 GB)',
          '4. Wait and reload this page to check when it finishes',
          '5. Do not close Chrome during the download',
        ])
        showVerdict(false, '⬇️ Download in progress', 'Wait for the download to finish and reload this page.')

        // Poll every 15 seconds to auto-detect when it becomes ready
        startPolling(api, apiName)
        return
      }

      if (avail === 'downloadable' || avail === 'after-download') {
        setStatus('⬇️', 'Model available but not downloaded', 'The download has not started automatically yet.', 'border-yellow-700')
        showInstructions([
          '1. Go to <code class="bg-gray-800 px-1 rounded">chrome://components</code>',
          '2. Find <strong>"Optimization Guide On Device Model"</strong>',
          '3. Click <strong>Check for updates</strong> to start the download',
          '4. Or go to <code class="bg-gray-800 px-1 rounded">chrome://on-device-model-internals</code> to force the download',
          '5. Wait for the download to complete (~1–3 GB) and reload this page',
        ])
        showVerdict(false, '⬇️ Download required', 'Follow the instructions above to start the download.')
        return
      }

      if (avail !== 'readily') {
        // Unknown status — show raw value so the user can report it
        setStatus('⚠️', `Unknown status: "${avail}"`, 'The API returned an unexpected value.', 'border-orange-700')
        showVerdict(false, '⚠️ Unexpected status', `Value received: "${avail}". Try updating Chrome.`)
        return
      }

      // avail === 'readily'
      setStatus('✅', 'Model ready!', `API: ${apiName} · Availability: ${avail}`, 'border-green-700')

      // 3 — Fetch model capabilities
      try {
        const caps = await api.capabilities()
        showModelInfo({
          'API detected': apiName,
          'Availability': avail,
          'Default temperature': caps.defaultTemperature ?? 'n/a',
          'Max temperature': caps.maxTemperature ?? 'n/a',
          'Default TopK': caps.defaultTopK ?? 'n/a',
          'Max TopK': caps.maxTopK ?? 'n/a',
        })
      } catch {
        showModelInfo({ 'API detected': apiName, 'Availability': avail, 'Capabilities': 'not available' })
      }

      // 4 — Show test section
      $('test-section').classList.remove('hidden')

      $('btn-test').addEventListener('click', async () => {
        const btn = $('btn-test')
        btn.disabled = true
        btn.textContent = 'Running...'
        $('test-result').classList.add('hidden')

        const t0 = performance.now()
        let session
        try {
          session = await api.create()
          const answer = await session.prompt('Answer in one sentence: what is the capital of Brazil?')
          const elapsed = ((performance.now() - t0) / 1000).toFixed(1)

          $('test-answer').textContent = answer
          $('test-timing').textContent = `Response time: ${elapsed}s`
          $('test-result').classList.remove('hidden')

          showVerdict(true, '✅ AI ready!', `Response received in ${elapsed}s. You can proceed to the application.`)
        } catch (e) {
          $('test-answer').textContent = `Error: ${e.message}`
          $('test-result').classList.remove('hidden')
          showVerdict(false, '⚠️ Execution error', e.message)
        } finally {
          session?.destroy()
          btn.disabled = false
          btn.textContent = 'Run Test Again'
        }
      })
    }

    runDiagnosis()
  </script>
</body>
</html>
